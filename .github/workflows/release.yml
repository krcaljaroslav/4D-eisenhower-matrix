name: Release

# Spustí se vždy, když pushneš tag jako "0.1.4", "1.0.0", atd.
# Lokálně:
#   1. Bump verze v manifest.json + versions.json
#   2. npm run build  (volitelné — workflow buildí stejně)
#   3. git commit
#   4. git tag 0.1.4
#   5. git push && git push --tags
#
# Workflow pak:
#   - Spustí npm install + npm run build
#   - Vygeneruje build-provenance attestace pro release assety
#   - Vytvoří GitHub Release s tagem
#   - Připojí main.js + manifest.json + styles.css jako assety
#
# BRAT na všech zařízeních najde update do 15 min.

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify version match
        # Tag musí odpovídat version v manifest.json (BRAT to vyžaduje)
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag '$TAG' nesedí s manifest.json version '$MANIFEST_VERSION'"
            exit 1
          fi
          echo "✓ Tag $TAG matches manifest version"

      - name: Attest build provenance
        # Kryptografický build-provenance podpis release assetů.
        # Doporučeno Obsidian plugin review.
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            main.js manifest.json styles.css
